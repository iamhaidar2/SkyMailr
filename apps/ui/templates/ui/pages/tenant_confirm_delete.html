{% extends "ui/base.html" %}
{% block content %}
<div class="mx-auto max-w-lg space-y-6">
  <div class="rounded-xl border border-red-900/60 bg-red-950/30 p-5">
    <h2 class="text-lg font-semibold text-white">Delete tenant</h2>
    <p class="mt-2 text-sm text-slate-300">
      You are about to delete <strong class="text-white">{{ tenant.name }}</strong>
      (<code class="text-slate-400">{{ tenant.slug }}</code>).
    </p>
    <p class="mt-3 text-sm text-red-200/90">
      This permanently removes API keys, sender profiles, domains, and messages tied to this tenant (cascade).
    </p>
  </div>
  <form method="post" class="flex flex-wrap gap-3">
    {% csrf_token %}
    <button type="submit" class="rounded-md bg-red-700 px-4 py-2 text-sm font-medium text-white hover:bg-red-600">Delete tenant</button>
    <a href="{% url 'ui:tenant_detail' tenant.id %}" class="rounded-md border border-surface-600 px-4 py-2 text-sm text-slate-300 hover:bg-surface-800">Cancel</a>
  </form>
</div>
{% endblock %}
