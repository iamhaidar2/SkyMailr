{% extends "ui/base.html" %}
{% block content %}
<div class="mx-auto max-w-5xl space-y-6">
  <a href="{% url 'ui:template_detail' template.id %}" class="text-sm text-blue-400">← Back to template</a>
  <div>
    <h2 class="text-lg font-semibold text-white">Rendered preview</h2>
    <p class="text-sm text-slate-500">Subject: {{ rendered.subject }}</p>
  </div>
  <div class="grid gap-6 lg:grid-cols-2">
    <div class="rounded-xl border border-surface-600 bg-surface-850 p-4">
      <h3 class="text-sm font-medium text-white">HTML</h3>
      <div class="mt-3 max-h-[480px] overflow-auto rounded border border-surface-700 bg-white p-4 text-slate-900">{{ rendered.html|safe }}</div>
    </div>
    <div class="rounded-xl border border-surface-600 bg-surface-850 p-4">
      <h3 class="text-sm font-medium text-white">Text</h3>
      <pre class="mt-3 max-h-[480px] overflow-auto whitespace-pre-wrap rounded border border-surface-700 bg-surface-900 p-4 text-xs text-slate-300">{{ rendered.text }}</pre>
    </div>
  </div>
</div>
{% endblock %}
