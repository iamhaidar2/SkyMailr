{% extends "ui/base.html" %}
{% block content %}
<div class="mx-auto max-w-lg space-y-6">
  <div class="rounded-xl border border-surface-600 bg-surface-850 p-5">
    <h2 class="text-lg font-semibold text-white">Delete sender profile</h2>
    <p class="mt-2 text-sm text-slate-300">
      Remove <strong class="text-white">{{ profile.name }}</strong>
      (<code class="text-slate-400">{{ profile.from_email }}</code>) from {{ tenant.name }}?
    </p>
  </div>
  <form method="post" class="flex flex-wrap gap-3">
    {% csrf_token %}
    <button type="submit" class="rounded-md bg-red-700 px-4 py-2 text-sm font-medium text-white hover:bg-red-600">Delete profile</button>
    <a href="{% url 'ui:tenant_detail' tenant.id %}" class="rounded-md border border-surface-600 px-4 py-2 text-sm text-slate-300 hover:bg-surface-800">Cancel</a>
  </form>
</div>
{% endblock %}
