{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terms · SkyMailr</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("skymailr_marketing_theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-mk-theme", t);
        else document.documentElement.setAttribute("data-mk-theme", "light");
      } catch (e) {
        document.documentElement.setAttribute("data-mk-theme", "light");
      }
    })();
  </script>
  <link rel="stylesheet" href="{% static 'ui/css/app.css' %}">
  <link rel="stylesheet" href="{% static 'ui/css/marketing.css' %}">
</head>
<body class="mk-page min-h-screen p-8">
  <div class="mx-auto max-w-2xl text-[var(--mk-text-muted)]">
    <p class="mb-4"><a href="{% url 'ui:home' %}" class="text-[var(--mk-accent)] hover:underline">← SkyMailr</a></p>
    <h1 class="mb-4 text-2xl font-semibold text-[var(--mk-text)]">Terms of service</h1>
    <p class="text-sm leading-relaxed">Placeholder terms page. Replace with your jurisdiction-specific terms and acceptable use policy.</p>
  </div>
  <script src="{% static 'ui/js/marketing_theme.js' %}" defer></script>
</body>
</html>
