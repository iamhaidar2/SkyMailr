{% extends "ui/customer/base.html" %}
{% block content %}
<div class="mx-auto max-w-6xl space-y-6">
  <div>
    <h2 class="text-2xl font-semibold text-white">Messages</h2>
    <p class="mt-1 text-sm text-slate-500">Recent messages across your connected apps (up to 100).</p>
  </div>
  <div class="rounded-xl border border-surface-600 bg-surface-850 overflow-hidden">
    <div class="border-b border-surface-600 px-5 py-3">
      <h3 class="text-sm font-semibold text-white">All messages</h3>
    </div>
    <div class="overflow-x-auto">
      {% include "ui/customer/partials/portal_message_table.html" with messages=messages empty_message="No messages yet." %}
    </div>
  </div>
</div>
{% endblock %}
