<script>
  (function () {
    var key = "skymailr_portal_theme";
    function setTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      try {
        localStorage.setItem(key, t);
      } catch (e) {}
      var isLight = t === "light";
      var btnDark = document.getElementById("portal-theme-dark");
      var btnLight = document.getElementById("portal-theme-light");
      if (btnDark && btnLight) {
        btnDark.classList.toggle("customer-theme-segment--active", !isLight);
        btnLight.classList.toggle("customer-theme-segment--active", isLight);
        btnDark.setAttribute("aria-pressed", isLight ? "false" : "true");
        btnLight.setAttribute("aria-pressed", isLight ? "true" : "false");
      }
    }
    function currentTheme() {
      return document.documentElement.getAttribute("data-theme") || "dark";
    }
    document.getElementById("portal-theme-dark")?.addEventListener("click", function () {
      setTheme("dark");
    });
    document.getElementById("portal-theme-light")?.addEventListener("click", function () {
      setTheme("light");
    });
    setTheme(currentTheme());
  })();
</script>
