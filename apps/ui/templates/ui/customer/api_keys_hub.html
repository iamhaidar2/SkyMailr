{% extends "ui/customer/base.html" %}
{% block content %}
<div class="mx-auto max-w-3xl space-y-6">
  <h2 class="text-2xl font-semibold text-white">API keys</h2>
  <p class="text-sm text-slate-400">Keys are per tenant. Open a tenant to create or view keys.</p>
  <ul class="space-y-3">
    {% for t in tenants %}
      <li class="rounded-lg border border-surface-600 bg-surface-850 px-4 py-3">
        <a href="{% url 'portal:tenant_detail' t.id %}" class="font-medium text-blue-400 hover:underline">{{ t.name }}</a>
        <span class="text-slate-600">·</span>
        <span class="text-sm text-slate-500">{{ t.active_key_count }} active key(s)</span>
      </li>
    {% empty %}
      <li class="text-slate-500">No tenants yet.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
