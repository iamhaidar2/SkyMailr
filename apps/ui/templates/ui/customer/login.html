{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · SkyMailr</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ui/css/app.css' %}">
</head>
<body class="flex min-h-screen items-center justify-center bg-surface-900 p-6">
  <div class="w-full max-w-md rounded-xl border border-surface-600 bg-surface-850 p-8 shadow-xl">
    <h1 class="text-xl font-semibold text-white">Customer sign in</h1>
    <p class="mt-1 text-sm text-slate-500">Use the email and password from signup.</p>
    {% if form.errors %}
      <div class="mt-4 rounded-lg border border-red-800 bg-red-950/40 px-3 py-2 text-sm text-red-200">Invalid email or password.</div>
    {% endif %}
    <form method="post" action="{% url 'portal:login' %}" class="mt-6 space-y-4">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      {% for field in form %}
        <div>
          <label class="mb-1 block text-sm text-slate-400" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
        </div>
      {% endfor %}
      <button type="submit" class="w-full rounded-md bg-accent px-4 py-2.5 text-sm font-medium text-white hover:bg-blue-600">Sign in</button>
    </form>
    <p class="mt-4 text-center text-sm"><a href="{% url 'portal:password_reset' %}" class="text-slate-400 hover:text-white">Forgot password?</a></p>
    <p class="mt-4 text-center text-sm"><a href="{% url 'portal:signup' %}" class="text-blue-400 hover:underline">Create an account</a></p>
    <p class="mt-4 text-center text-xs text-slate-600">Staff operator? <a href="{% url 'ui:login' %}" class="text-slate-400 hover:underline">Staff sign-in</a></p>
  </div>
</body>
</html>
