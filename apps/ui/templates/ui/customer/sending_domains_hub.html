{% extends "ui/customer/base.html" %}
{% block content %}
<div class="mx-auto max-w-3xl space-y-6">
  <div>
    <h2 class="text-2xl font-semibold text-white">Sending domains</h2>
    <p class="mt-1 text-sm text-slate-500">Choose a connected app to manage its domains and DNS.</p>
  </div>
  <div class="rounded-xl border border-surface-600 bg-surface-850 p-5">
    <ul class="divide-y divide-surface-700">
      {% for t in sending_domains_tenants %}
        <li class="flex flex-wrap items-center justify-between gap-3 py-3 first:pt-0 last:pb-0">
          <div>
            <p class="font-medium text-white">{{ t.name }}</p>
            <p class="font-mono text-xs text-slate-500">{{ t.slug }}</p>
          </div>
          <a href="{% url 'portal:tenant_domain_list' t.id %}" class="rounded-md bg-accent px-3 py-1.5 text-sm font-medium text-white hover:bg-blue-600">Open domains</a>
        </li>
      {% endfor %}
    </ul>
  </div>
  <p class="text-sm text-slate-500"><a href="{% url 'portal:tenant_list' %}" class="text-blue-400 hover:underline">← All connected apps</a></p>
</div>
{% endblock %}
