[project]
name = "skymailr-client"
version = "0.1.0"
description = "HTTP client for SkyMailr email API"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27"]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["skymailr_client"]
